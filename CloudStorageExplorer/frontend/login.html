<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus - Log In</title>
    <link rel="icon" href="favicon.ico">
    <!-- Correct relative path from frontend/ folder to static/css/ -->
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

    <div class="auth-page">
        <!-- Aside section for branding/visuals where your cloud icon likely lives -->
        <aside class="auth-page__aside">
            <div class="brand">
                <!-- If the icon is an inline SVG or img, the CSS will now scale it properly inside .auth-page__aside -->
                <span class="brand__icon">☁️</span>
                <h1 class="brand__title">Nimbus</h1>
            </div>
            <p class="auth-page__subtitle">Cloud Storage Explorer</p>
        </aside>

        <!-- Form container wrapper -->
        <div class="auth-page__form-wrap">
            <form id="login-form" class="auth-form">
                <h2 class="auth-form__title">Welcome Back</h2>
                <p class="auth-form__subtitle">Please log in to your account</p>

                <!-- Target for JS errors -->
                <div id="form-error" class="form-error"></div>

                <div class="field">
                    <label for="email" class="field__label">Email Address</label>
                    <input type="email" id="email" name="email" class="field__input" required placeholder="name@example.com">
                </div>

                <div class="field">
                    <label for="password" class="field__label">Password</label>
                    <input type="password" id="password" name="password" class="field__input" required placeholder="••••••••">
                </div>

                <button type="submit" class="auth-form__submit-btn">Log In</button>

                <p class="auth-form__footer">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Clean link to your external JavaScript -->
    <script src="../static/js/script.js"></script>
</body>
</html>
