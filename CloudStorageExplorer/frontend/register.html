<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus - Register</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

    <div class="auth-page">
        <aside class="auth-page__aside">
            <div class="brand">
                <span class="brand__icon">☁️</span>
                <h1 class="brand__title">Nimbus</h1>
            </div>
            <p class="auth-page__subtitle">Create your secure cloud storage space</p>
        </aside>

        <div class="auth-page__form-wrap">
            <form id="register-form" class="auth-form">
                <h2 class="auth-form__title">Create Account</h2>
                
                <div id="form-error" class="form-error"></div>

                <div class="field">
                    <label for="email" class="field__label">Email Address</label>
                    <input type="email" id="email" name="email" class="field__input" required placeholder="name@example.com">
                </div>

                <div class="field">
                    <label for="password" class="field__label">Password</label>
                    <input type="password" id="password" name="password" class="field__input" required placeholder="Minimum 6 characters">
                </div>

                <button type="submit" class="auth-form__submit-btn">Register</button>

                <p class="auth-form__footer">
                    Already have an account? <a href="login.html">Log in here</a>
                </p>
            </form>
        </div>
    </div>

    
    <script src="../static/js/script.js"></script>
</body>
</html>
