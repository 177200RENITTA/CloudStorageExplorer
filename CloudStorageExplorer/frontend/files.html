<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your files — Nimbus</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <nav class="nav">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" style="color: var(--accent)">
        <path d="M7 18a4.5 4.5 0 0 1-.4-8.98A5.5 5.5 0 0 1 17.2 8.1 4 4 0 0 1 17 18H7Z" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 10.5v6M9.2 13.3 12 10.5l2.8 2.8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Nimbus
    </div>
    <div class="nav-links">
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link active" href="files.html">Files</a>
      <a class="nav-link" href="upload.html">Upload</a>
      <a class="nav-link" href="#" id="logout-btn">Log out</a>
    </div>
  </nav>

  <main class="page">
    <div style="display:flex; align-items:center; justify-content:space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;">
      <div>
        <h1 style="margin-bottom: 4px;">Your files</h1>
        <p style="margin: 0;">Everything you've uploaded to Nimbus.</p>
      </div>
      <a href="upload.html" class="btn btn-primary">Upload a file</a>
    </div>

    <div id="alert" class="alert"></div>

    <div class="field" style="max-width: 340px; margin-bottom: 20px;">
      <input type="text" id="search-input" placeholder="Search by filename..." />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>File</th>
            <th>Size</th>
            <th>Uploaded</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="files-body">
          <tr><td colspan="4" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    requireAuth();

    document.getElementById("logout-btn").addEventListener("click", (e) => {
      e.preventDefault();
      logout();
    });

    const alertEl = document.getElementById("alert");
    const body = document.getElementById("files-body");
    const searchInput = document.getElementById("search-input");

    let searchTimer = null;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadFiles(searchInput.value.trim()), 300);
    });

    async function loadFiles(search = "") {
      try {
        const query = search ? `?search=${encodeURIComponent(search)}` : "";
        const response = await apiFetch(`/files${query}`);
        if (!response.ok) throw new Error(await readErrorMessage(response));
        const files = await response.json();
        renderFiles(files, search);
      } catch (err) {
        showAlert(alertEl, err.message, "error");
      }
    }

    function renderFiles(files, search) {
      body.innerHTML = "";

      if (files.length === 0) {
        const message = search
          ? `No files match "${escapeHtml(search)}".`
          : `No files yet — <a href="upload.html">upload your first one</a>.`;
        body.innerHTML = `<tr><td colspan="4" class="empty-state">${message}</td></tr>`;
        return;
      }

      for (const file of files) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="file-name">${escapeHtml(file.filename)}</td>
          <td class="file-meta">${formatBytes(file.file_size)}</td>
          <td class="file-meta">${formatDate(file.upload_date)}</td>
          <td>
            <div class="row-actions">
              <button class="btn btn-ghost" data-action="download" data-id="${file.id}">Download</button>
              <button class="btn btn-danger" data-action="delete" data-id="${file.id}" data-name="${escapeHtml(file.filename)}">Delete</button>
            </div>
          </td>
        `;
        body.appendChild(row);
      }
    }

    body.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;

      const id = btn.dataset.id;

      if (btn.dataset.action === "download") {
        await handleDownload(id, btn);
      } else if (btn.dataset.action === "delete") {
        await handleDelete(id, btn.dataset.name, btn);
      }
    });

    async function handleDownload(id, btn) {
      hideAlert(alertEl);
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = "Preparing...";

      try {
        const response = await apiFetch(`/files/${id}/download`);
        if (!response.ok) throw new Error(await readErrorMessage(response));
        const data = await response.json();
        window.open(data.download_url, "_blank");
      } catch (err) {
        showAlert(alertEl, err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    async function handleDelete(id, filename, btn) {
      if (!confirm(`Delete "${filename}"? This can't be undone.`)) return;

      hideAlert(alertEl);
      btn.disabled = true;

      try {
        const response = await apiFetch(`/files/${id}`, { method: "DELETE" });
        if (!response.ok && response.status !== 204) {
          throw new Error(await readErrorMessage(response));
        }
        loadFiles(searchInput.value.trim());
      } catch (err) {
        showAlert(alertEl, err.message, "error");
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    loadFiles();
  </script>
</body>
</html>
